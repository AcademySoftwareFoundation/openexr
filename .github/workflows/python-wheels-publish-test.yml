name: Publish python distribution 📦 to TestPyPI

on:

  # Publish python wheels to test.pypi when a release candidate is tagged, 
  # e.g. v3.4.5-rc, v3.4.5-rc6, etc.

  push:
    tags:
      - v3.[0-9]+.[0-9]+-rc*
  workflow_dispatch:

concurrency:
  group: testpypi-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  guard:
    name: Verify RB-* release ref
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Verify RB-* release ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$REF_NAME" != RB-* ]]; then
            echo "::error::workflow_dispatch must use an RB-* branch (not $REF_NAME)."
            exit 1
          fi

          git fetch origin '+refs/heads/RB-*:refs/remotes/origin/RB-*' || git fetch origin

          if ! git branch -r --contains HEAD | grep -E -q 'origin/RB-'; then
            echo "::error::Ref must be on an RB-* release branch (not main)."
            git branch -r --contains HEAD || true
            exit 1
          fi

  build:
    name: Python Wheels - ${{ matrix.os }}-${{ matrix.arch }}
    needs: guard
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: macos-15-intel
            arch: x64
            cibw_archs_macos: x86_64 universal2
          - os: macos-latest
            arch: arm64
            cibw_archs_macos: arm64
          - os: windows-latest
            arch: x64

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Create sdist
        # Only create it once.
        if: ${{ matrix.os == 'ubuntu-latest' }}
        env:
          OPENEXR_RELEASE_CANDIDATE_TAG: ${{ github.ref_name }}
        run: pipx run build==1.2.2.post1 --sdist . --outdir wheelhouse

      - name: Build wheel
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55  # v4.1.0
        with:
          output-dir: wheelhouse
        env:
          MACOSX_DEPLOYMENT_TARGET: 10.15
          # Split macOS arches across runners so artifact merge does not collide on filenames.
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs_macos }}
          # Build Python 3.9 through 3.13.
          # Skip 32-bit wheels builds on Windows
          # Also skip the PyPy builds, since they fail the unit tests
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-win32 *_i686"
          CIBW_ENVIRONMENT: OPENEXR_RELEASE_CANDIDATE_TAG="${{ github.ref_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ./wheelhouse/*.whl
            ./wheelhouse/*.tar.gz
  
  publish-to-testpypi:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    needs:
    - build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/openexr

    permissions:
      contents: read
      actions: read
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
